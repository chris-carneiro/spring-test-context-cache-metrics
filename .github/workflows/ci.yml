name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

env:
  MAVEN_ARGS: -B -V -ntp -e -Djansi.passthrough=true -Dstyle.color=always

jobs:

  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: maven

      - name: Build and test
        run: ./mvnw $MAVEN_ARGS verify

      - name: Publish test report
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        if: success() || failure()
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'

      - name: Publish coverage report on PR
        id: jacoco
        uses: madrapps/jacoco-report@50d3aff4548aa991e6753342d9ba291084e63848 # v1.7.2
        if: github.event_name == 'pull_request'
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 90

      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        if: github.event_name == 'pull_request'
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 4fd1853ee9f26a605eb1f89ee3b07192
          filename: spring-test-context-cache-metrics-coverage.json
          label: coverage
          message: ${{ steps.jacoco.outputs.coverage-overall }}%
          color: green

  javadoc:
    name: Javadoc
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: maven

      - name: Generate Javadoc
        run: ./mvnw $MAVEN_ARGS compile javadoc:javadoc
